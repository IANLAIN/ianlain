<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="IanLain - Systems & Computer Engineering Student">
    <meta name="keywords" content="portfolio, engineering, computer science, mathematics, astronomy">
    <meta name="author" content="IanLain">
    <meta name="theme-color" content="#06b6d4">
    <title>IanLain</title>
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="src/assets/images/favicon.svg">
    <link rel="alternate icon" type="image/png" href="src/assets/images/favicon-32.png" sizes="32x32">
    <link rel="apple-touch-icon" href="src/assets/images/favicon-192.png" sizes="192x192">
    <link rel="manifest" href="src/config/manifest.json">
    <meta name="application-name" content="IanLain">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" href="src/css/main.css" as="style">
    <link rel="stylesheet" href="src/css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body class="home-page">
    <!-- Background canvas for hypercube + cosmic animation -->
    <canvas id="hypercube-canvas" aria-hidden="true"></canvas>

    <nav class="navbar">
        <div class="nav-container">
            <a href="#home" class="logo">
                <div class="logo-icon">
                    <span class="logo-bracket"><</span>
                    <span class="logo-letter">I</span>
                    <span class="logo-bracket">/></span>
                </div>
            </a>
            
            <div class="nav-right">
                <div class="language-selector">
                    <button class="lang-btn active" data-lang="en" title="English">EN</button>
                    <button class="lang-btn" data-lang="es" title="Español">ES</button>
                    <button class="lang-btn" data-lang="fr" title="Français">FR</button>
                    <button class="lang-btn" data-lang="zh" title="中文">ZH</button>
                </div>
            </div>
        </div>
    </nav>

    <section id="home" class="hero">
        <div class="hero-content">
            <div class="profile-container">
                <img src="src/assets/images/profile.jpg" alt="IanLain Profile" class="profile-image" loading="eager" fetchpriority="high">
                <h1 class="hero-title">
                    <span class="nickname">IanLain</span>
                </h1>
                <p class="hero-subtitle" data-i18n="home.subtitle">Systems & Computer Engineering Student</p>
                <div class="hero-actions" aria-label="Primary actions">
                    <a href="/news" class="action-btn action-btn--ghost" data-i18n="home.news">News</a>
                    <button type="button" class="action-btn action-btn--solid" data-action="open-game" data-i18n="home.game">The Game</button>
                </div>
                <div class="hero-socials" aria-label="Social links">
                    <a href="https://github.com/IANLAIN" target="_blank" rel="noopener noreferrer" class="social-btn" aria-label="GitHub">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/>
                        </svg>
                        <span data-i18n="home.github">GitHub</span>
                    </a>
                    <a href="https://www.instagram.com/ian_connected/" target="_blank" rel="noopener noreferrer" class="social-btn" aria-label="Instagram">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
                            <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/>
                            <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/>
                        </svg>
                        <span data-i18n="home.instagram">Instagram</span>
                    </a>
                </div>
            </div>
        </div>
    </section>

    <div class="game-modal" data-game-modal hidden aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="gameModalTitle">
        <div class="game-modal__backdrop" data-action="close-game"></div>
        <div class="game-modal__panel">
            <button type="button" class="game-modal__close" data-action="close-game" aria-label="Close">&times;</button>
            <p class="game-modal__title" id="gameModalTitle" data-i18n="home.lose">You Just Lose :c</p>
            <a class="action-btn action-btn--solid game-modal__link" href="/galaga" data-i18n="home.realGame">juega algo de verdad</a>
        </div>
    </div>

    <script type="module" src="src/js/main.js"></script>
    
    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/src/js/sw.js').catch(() => {});
        }
    </script>
</body>
</html>
